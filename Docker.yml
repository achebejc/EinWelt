- name: Railway Deploy
  uses: bervProject/railway-deploy@0.1.2-beta
  version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: oneworld
      POSTGRES_USER: oneworld
      POSTGRES_PASSWORD: DhFoc36ZM1#6uVI*qO3p0iez
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
